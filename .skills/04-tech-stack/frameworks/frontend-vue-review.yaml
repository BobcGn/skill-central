  ## 2. 框架层面

  ### 2.1 Vue 2

  #### 2.1.1 组件设计

  **审查要点：**
  - 检查组件的职责分离
  - 验证组件的props和events设计

  **优化建议：**
  ```vue
  <!-- 推荐 -->
  <template>
    <div class="user-card">
      <h2>{{ user.name }}</h2>
      <p>{{ user.email }}</p>
      <button @click="$emit('edit', user.id)">编辑</button>
    </div>
  </template>

  <script>
  export default {
    name: 'UserCard',
    props: {
      user: {
        type: Object,
        required: true
      }
    },
    emits: ['edit']
  }
  </script>
  ```

  #### 2.1.2 响应式数据

  **审查要点：**
  - 检查data属性的合理使用
  - 验证计算属性和侦听器的正确实现

  **优化建议：**
  ```javascript
  // 推荐
  export default {
    data() {
      return {
        users: []
      };
    },
    computed: {
      activeUsers() {
        return this.users.filter(user => user.active);
      }
    },
    watch: {
      users: {
        handler(newUsers) {
          console.log('Users changed:', newUsers);
        },
        deep: true
      }
    }
  };
  ```

  ### 2.2 Vue 3

  #### 2.2.1 Composition API

  **审查要点：**
  - 检查Composition API的正确使用
  - 验证逻辑组合的合理性

  **优化建议：**
  ```vue
  <template>
    <div>
      <h1>{{ title }}</h1>
      <ul>
        <li v-for="item in items" :key="item.id">{{ item.name }}</li>
      </ul>
    </div>
  </template>

  <script setup>
  import { ref, computed } from 'vue';

  // 响应式数据
  const items = ref([]);

  // 计算属性
  const title = computed(() => `Items (${items.value.length})`);

  // 方法
  async function fetchItems() {
    // 实现
  }
  </script>
  ```

  #### 2.2.2 响应式API

  **审查要点：**
  - 检查ref和reactive的合理使用
  - 验证toRefs和toRef的正确应用

