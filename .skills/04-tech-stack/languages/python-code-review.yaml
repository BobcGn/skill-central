  ## 3. 性能优化

  ### 3.1 代码优化

  **审查要点：**
  - 检查循环的效率
  - 验证算法的选择
  - 检查内存使用

  **优化建议：**
  ```python
  # 不推荐
  def find_duplicates(items):
      """查找重复项
      
      时间复杂度: O(n²)
      """
      duplicates = []
      for i in range(len(items)):
          for j in range(i + 1, len(items)):
              if items[i] == items[j] and items[i] not in duplicates:
                  duplicates.append(items[i])
      return duplicates

  # 推荐
  def find_duplicates(items):
      """查找重复项
      
      时间复杂度: O(n)
      
      Args:
          items: 要检查的列表
      
      Returns:
          重复项的列表
      """
      seen = set()
      duplicates = set()
      for item in items:
          if item in seen:
              duplicates.add(item)
          else:
              seen.add(item)
      return list(duplicates)
  ```

  ### 3.2 数据库优化

  **审查要点：**
  - 检查SQL查询的效率
  - 验证索引的合理使用
  - 检查ORM的正确使用

  **优化建议：**
  ```python
  # Django ORM优化示例

  # 不推荐
  users = User.objects.all()
  for user in users:
      # 每次循环都会执行一次数据库查询
      posts = user.post_set.all()
      print(f"{user.username} 有 {posts.count()} 篇文章")

  # 推荐：使用select_related (一对一和多对一关系)
  users = User.objects.select_related('profile').all()
  for user in users:
      # 不会执行额外的数据库查询
      print(f"{user.username} 的年龄是 {user.profile.age}")

  # 推荐：使用prefetch_related (多对多和反向 ForeignKey 关系)
  users = User.objects.prefetch_related('post_set').all()
  for user in users:
      # 不会执行额外的数据库查询
      print(f"{user.username} 有 {user.post_set.count()} 篇文章")

  # 推荐：使用values或values_list减少数据传输
  user_names = User.objects.values_list('username', flat=True)
  print(list(user_names))
  ```

  ### 3.3 缓存策略

  **审查要点：**
  - 检查缓存的合理使用
  - 验证缓存失效策略
  - 检查缓存键的设计

  **优化建议：**
  ```python
  # Django缓存示例
  from django.core.cache import cache

  def get_user_data(user_id):
      """获取用户数据
      
      使用缓存减少数据库查询
      
      Args:
          user_id: 用户ID
      
      Returns:
          用户数据
      """
      cache_key = f"user_data:{user_id}"
      user_data = cache.get(cache_key)
      
      if user_data is None:
          # 从数据库获取数据
          user = User.objects.get(id=user_id)
          user_data = {
              'id': user.id,
              'username': user.username,
              'email': user.email
          }
          # 缓存数据，设置过期时间
          cache.set(cache_key, user_data, 3600)  # 1小时
      
      return user_data

  # Flask缓存示例
  from flask import Flask
  from flask_caching import Cache

  app = Flask(__name__)
  app.config['CACHE_TYPE'] = 'simple'
  cache = Cache(app)

  @app.route('/api/data')
  @cache.cached(timeout=60)
  def get_data():
      """获取数据
      
      使用缓存减少处理时间
      
      Returns:
          JSON响应
      """
      # 假设这是一个耗时的操作
      data = {'key': 'value'}
      return jsonify(data)
  ```

  ## 4. 安全性

  ### 4.1 输入验证

  **审查要点：**
  - 检查用户输入的验证
  - 验证表单的处理
  - 检查是否防止了注入攻击

  **优化建议：**
  ```python
  # Django表单验证
  from django import forms

  class UserForm(forms.Form):
      """用户表单
      """
      username = forms.CharField(max_length=150, required=True)
      email = forms.EmailField(required=True)
      password = forms.CharField(widget=forms.PasswordInput, required=True)

  # 使用示例
  def register(request):
      if request.method == 'POST':
          form = UserForm(request.POST)
          if form.is_valid():
              # 处理有效数据
              username = form.cleaned_data['username']
              email = form.cleaned_data['email']
              # 创建用户等逻辑
              return redirect('success')
      else:
          form = UserForm()
      return render(request, 'register.html', {'form': form})

  # Flask输入验证
  from flask import Flask, request, jsonify
  from wtforms import Form, StringField, EmailField, validators

  app = Flask(__name__)

  class UserForm(Form):
      """用户表单
      """
      username = StringField('Username', [validators.Length(min=4, max=25)])
      email = EmailField('Email Address', [validators.DataRequired(), validators.Email()])

  @app.route('/register', methods=['POST'])
  def register():
      form = UserForm(request.form)
      if form.validate():
          # 处理有效数据
          return jsonify({'message': '注册成功'})
      return jsonify({'errors': form.errors}), 400
  ```

