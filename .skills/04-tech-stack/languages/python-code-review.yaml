      """
      # 测试正常情况
      assert calculate_interest(1000, 5, 1) == 50
      # 测试边界情况
      assert calculate_interest(0, 5, 1) == 0
      assert calculate_interest(1000, 0, 1) == 0
      assert calculate_interest(1000, 5, 0) == 0

