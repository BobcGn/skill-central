  # Django认证
  from django.contrib.auth.decorators import login_required, permission_required
  from django.contrib.auth.models import User
  from django.contrib.auth.hashers import make_password

  # 创建用户时使用密码哈希
  def create_user(username, password, email):
      """创建用户
      
      Args:
          username: 用户名
          password: 密码
          email: 邮箱
      
      Returns:
          创建的用户对象
      """
      user = User.objects.create(
          username=username,
          email=email,
          password=make_password(password)  # 使用密码哈希
      )
      return user

  # 使用装饰器保护视图
  @login_required
  def profile(request):
      """用户个人资料视图
      
      需要用户登录
      """
      return render(request, 'profile.html')

  @permission_required('app.change_user')
  def edit_user(request, user_id):
      """编辑用户视图
      
      需要change_user权限
      """
      # 编辑用户逻辑
      pass

  # Flask认证
  from flask import Flask, request, jsonify, g
  from flask_httpauth import HTTPBasicAuth
  from werkzeug.security import generate_password_hash, check_password_hash

  app = Flask(__name__)
  auth = HTTPBasicAuth()

  users = {
      "alice": generate_password_hash("secret"),
      "bob": generate_password_hash("password")
  }

  @auth.verify_password
  def verify_password(username, password):
      """验证密码
      """
      if username in users and check_password_hash(users.get(username), password):
          g.user = username
          return True
      return False

  @app.route('/api/protected')
  @auth.login_required
  def protected():
      """受保护的API
      
      需要认证
      """
      return jsonify({'message': f'Hello, {g.user}!'})
  ```

  ### 4.3 敏感信息保护

  **审查要点：**
  - 检查敏感信息的存储
  - 验证环境变量的使用
  - 检查日志中的敏感信息

  **优化建议：**
  ```python
  # 不推荐
  # 硬编码的敏感信息
  SECRET_KEY = 'your-secret-key-here'
  DATABASE_URL = 'postgresql://user:password@localhost/dbname'

  # 推荐
  # 使用环境变量
  import os
  from dotenv import load_dotenv

  # 加载.env文件
  load_dotenv()

  # 从环境变量获取敏感信息
  SECRET_KEY = os.environ.get('SECRET_KEY')
  DATABASE_URL = os.environ.get('DATABASE_URL')

  # 日志中避免记录敏感信息
  def log_user_action(user_id, action, sensitive_data=None):
      """记录用户操作
      
      Args:
          user_id: 用户ID
          action: 操作类型
          sensitive_data: 敏感数据（不会被记录）
      """
      # 只记录非敏感信息
      print(f"用户 {user_id} 执行了 {action} 操作")
      # 敏感数据不记录到日志
      if sensitive_data:
          print("操作包含敏感数据，已省略")
  ```

