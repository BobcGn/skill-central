  - **Badgen.net**: Lightweight badge generation service

  ### 3. Documentation Tools

  - **Docsify**: Lightweight documentation site generator
  - **Docusaurus**: Powerful documentation site framework
  - **MkDocs**: Markdown-based documentation generator

  ### 4. Translation Tools

  - **DeepL**: High-quality machine translation
  - **Google Translate**: Widely used translation service
