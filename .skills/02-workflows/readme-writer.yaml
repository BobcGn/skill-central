  ## API

  ### `projectName.doSomething(options)`

  Performs an operation

  **Parameters**:
  - `options` (Object): Configuration options
    - `param1` (string): Parameter 1
    - `param2` (number): Parameter 2

  **Returns**:
  - `Promise<Result>`: Operation result

  ### `projectName.anotherMethod(value)`

  Performs another operation

  **Parameters**:
  - `value` (string): Input value

  **Returns**:
  - `string`: Processed value

  ## Examples

  ### Example 1: Basic Usage

  ```javascript
  import projectName from 'project-name';

  async function example() {
    try {
      const result = await projectName.doSomething({
        param1: 'value1',
        param2: 42
      });
      console.log('Operation succeeded:', result);
    } catch (error) {
      console.error('Operation failed:', error);
    }
  }

  example();
  ```

