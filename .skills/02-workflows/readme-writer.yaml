  ## 使用指南

  ### 基本用法

  ```javascript
  import AwesomeProject from 'awesome-project';

  // 初始化
  const app = new AwesomeProject({
    apiKey: 'your-api-key',
    debug: true
  });

  // 使用功能
  app.doSomething('input')
    .then(result => console.log('结果:', result))
    .catch(error => console.error('错误:', error));
  ```

  ### 高级配置

  ```javascript
  // 全局配置
  AwesomeProject.configure({
    defaultTimeout: 5000,
    retryCount: 3,
    baseUrl: 'https://api.example.com'
  });

  // 实例配置
  const app = new AwesomeProject({
    // 实例特定配置
    customOption: true
  });
  ```

