  ## 基本用法

  ```javascript
  // 导入库
  import projectName from 'project-name';

  // 基本使用
  const result = projectName.doSomething();
  console.log(result);
  ```

  ## API

  ### `projectName.doSomething(options)`

  执行某个操作

  **参数**：
  - `options` (Object): 配置选项
    - `param1` (string): 参数1
    - `param2` (number): 参数2

  **返回值**：
  - `Promise<Result>`: 操作结果

  ### `projectName.anotherMethod(value)`

  执行另一个操作

  **参数**：
  - `value` (string): 输入值

  **返回值**：
  - `string`: 处理后的值

  ## 示例

  ### 示例1：基本使用

  ```javascript
  import projectName from 'project-name';

  async function example() {
    try {
      const result = await projectName.doSomething({
        param1: 'value1',
        param2: 42
      });
      console.log('操作成功:', result);
    } catch (error) {
      console.error('操作失败:', error);
    }
  }

  example();
  ```

  ### 示例2：高级使用

  ```javascript
  import projectName from 'project-name';

  // 配置全局选项
  projectName.configure({
    defaultOption: true,
    timeout: 5000
  });

  // 使用高级功能
  const advancedResult = projectName.advancedMethod('input');
  console.log('高级操作结果:', advancedResult);
  ```

