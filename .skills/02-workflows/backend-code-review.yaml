prompt: |
  # Backend Code Review & Optimisation Guide

  ## 1. Language Layer

  ### 1.1 Kotlin

  **Reference docs:**
  - [JetBrains Kotlin tech stack docs (third-party translation)](https://openaidoc.org/)

  #### 1.1.1 Coroutine conventions

  **Review focus:**
  - Ensure all I/O operations use coroutines
  - Check coroutine scope management
  - Verify cancellation is correctly implemented

  **Suggested improvements:**
  ```kotlin
  // Not recommended
  fun fetchData() {
      Thread { /* network request */ }.start()
  }

  // Recommended
  suspend fun fetchData() {
      withContext(Dispatchers.IO) {
          // network request
      }
  }
  ```

  #### 1.1.2 Null safety

  **Review focus:**
  - Check correct use of nullable types
  - Verify null checks are complete

  **Suggested improvements:**
  ```kotlin
  // Not recommended
  fun processUser(user: User?) {
      if (user != null) {
          // process user
      }
  }

  // Recommended
  fun processUser(user: User) {
      // process user
  }

  fun processNullableUser(user: User?) {
      user?.let {
          // process user
      }
  }
  ```

  #### 1.1.3 Extension functions and properties

  **Review focus:**
  - Check whether extension functions are used appropriately
  - Verify naming conventions

  ### 1.2 Java

  #### 1.2.1 Concurrency handling

  **Review focus:**
  - Check correct use of thread pools
  - Verify implementation of synchronization mechanisms

  **Suggested improvements:**
  ```java
  // Not recommended
  ExecutorService executor = Executors.newFixedThreadPool(10);

  // Recommended
  ExecutorService executor = new ThreadPoolExecutor(
      5, 10, 60L, TimeUnit.SECONDS,
      new LinkedBlockingQueue<>(100),
      new ThreadPoolExecutor.CallerRunsPolicy()
  );
  ```

  #### 1.2.2 Exception handling

  **Review focus:**
  - Check appropriate use of exceptions
  - Verify the completeness of the exception chain

  #### 1.2.3 Resource management

  **Review focus:**
  - Check that resources are properly closed
  - Verify use of try-with-resources

  **Suggested improvements:**
  ```java
  // Not recommended
  BufferedReader reader = null;
  try {
      reader = new BufferedReader(new FileReader("file.txt"));
      // read file
  } catch (IOException e) {
      e.printStackTrace();
  } finally {
      if (reader != null) {
          try {
              reader.close();
          } catch (IOException e) {
              e.printStackTrace();
          }
      }
  }

  // Recommended
  try (BufferedReader reader = new BufferedReader(new FileReader("file.txt"))) {
      // read file
  } catch (IOException e) {
      e.printStackTrace();
  }
  ```

  ## 2. Framework Layer

  ### 2.1 Ktor

  #### 2.1.1 Routing management

  **Review focus:**
  - Check how routes are organised
  - Verify the conciseness of route handler functions

  **Suggested improvements:**
  ```kotlin
  // Recommended
  fun Application.configureRouting() {
      routing {
          apiRoutes()
          adminRoutes()
      }
  }

  private fun Route.apiRoutes() {
      route("/api") {
          get("/users") { /* handler */ }
          post("/users") { /* handler */ }
      }
  }
  ```

  #### 2.1.2 Middleware usage

  **Review focus:**
  - Check that middleware is correctly configured
  - Verify the execution order of middleware

  #### 2.1.3 Dependency injection

  **Review focus:**
  - Check how dependency injection is implemented
  - Verify the lifecycle management of services

  ### 2.2 Spring

  #### 2.2.1 Controller design

  **Review focus:**
  - Check separation of concerns in controllers
  - Verify validation of request parameters

  **Suggested improvements:**
  ```java
  // Recommended
  @RestController
  @RequestMapping("/api/users")
  public class UserController {

      private final UserService userService;

      public UserController(UserService userService) {
          this.userService = userService;
      }

      @GetMapping
      public ResponseEntity<List<User>> getUsers() {
          return ResponseEntity.ok(userService.findAll());
      }
  }
  ```

  #### 2.2.2 Service layer design

  **Review focus:**
  - Check the encapsulation of business logic
  - Verify the correct implementation of transaction management

  #### 2.2.3 Data access

  **Review focus:**
  - Check the design of Repositories
  - Verify optimisation of SQL queries

  **Suggested improvements:**
  ```java
  // Recommended
  @Repository
  public interface UserRepository extends JpaRepository<User, Long> {

      @Query("SELECT u FROM User u WHERE u.active = true")
      List<User> findActiveUsers();
  }
  ```

  ## 3. Performance Optimisation

  ### 3.1 Database optimisation

  **Review focus:**
  - Check the efficiency of SQL queries
  - Verify appropriate use of indexes
  - Check connection pool configuration

  ### 3.2 Caching strategy

  **Review focus:**
  - Check appropriate use of caching
  - Verify cache invalidation strategy

  ### 3.3 Network optimisation

  **Review focus:**
  - Check optimisation of HTTP requests
  - Verify connection reuse

  ## 4. Security

  ### 4.1 Authentication and authorisation

  **Review focus:**
  - Check the implementation of authentication mechanisms
  - Verify the completeness of authorisation policies

  ### 4.2 Input validation

  **Review focus:**
  - Check validation of user input
  - Verify the security of parameter binding

  ### 4.3 Sensitive information protection

  **Review focus:**
  - Check the storage of sensitive information
  - Verify appropriate use of encryption algorithms

  ## 5. Code Quality

  ### 5.1 Code style

  **Review focus:**
  - Check consistency of code style
  - Verify adherence to naming conventions

  ### 5.2 Test coverage

  **Review focus:**
  - Check the completeness of test cases
  - Verify test coverage

  ### 5.3 Documentation

  **Review focus:**
  - Check the completeness of code comments
  - Verify the accuracy of API documentation

  ## 6. Architecture Design

  ### 6.1 Modularity

  **Review focus:**
  - Check the reasonable division of modules
  - Verify dependencies between modules

  ### 6.2 Microservices architecture

  **Review focus:**
  - Check the definition of service boundaries
  - Verify how services communicate with each other

  ### 6.3 Scalability

  **Review focus:**
  - Check the scalability design of the system
  - Verify the implementation of load balancing

  ## 7. Review Process

  ### 7.1 Preparation

  1. Understand the project architecture
  2. Define the review scope
  3. Prepare review tools

  ### 7.2 Executing the review

  1. Static code analysis
  2. Code walkthrough
  3. Test verification

  ### 7.3 Report generation

  1. Organise the issues found
  2. Provide optimisation suggestions
  3. Track issue resolution

  ## 8. Recommended Tools

  ### 8.1 Static analysis tools

  - Kotlin: Detekt
  - Java: SonarQube
  - General: Checkstyle

  ### 8.2 Performance profiling tools

  - JProfiler
  - YourKit
  - VisualVM

  ### 8.3 Testing tools

  - JUnit 5
  - Mockito
  - TestContainers

  ## 9. Best Practices

  ### 9.1 Kotlin best practices

  - Use coroutines to handle asynchronous operations
  - Prefer immutable data structures
  - Use extension functions appropriately

  ### 9.2 Java best practices

  - Use try-with-resources to manage resources
  - Prefer interfaces over implementations
  - Use the Stream API appropriately

  ### 9.3 Framework best practices

  - Ktor: Organise routes reasonably and use middleware to handle cross-cutting concerns
  - Spring: Follow dependency injection principles and use annotations appropriately

  ## 10. Common Issues and Solutions

  ### 10.1 Memory leaks

  **Symptoms:**
  - Application memory usage keeps growing
  - Frequent GC execution

  **Solutions:**
  - Check the lifecycle of object references
  - Verify the proper release of resources

  ### 10.2 Performance bottlenecks

  **Symptoms:**
  - Response times are too long
  - CPU utilisation is too high

  **Solutions:**
  - Use performance profiling tools to locate bottlenecks
  - Optimise algorithms and data structures

  ### 10.3 Concurrency issues

  **Symptoms:**
  - Data inconsistency
  - Deadlocks

  **Solutions:**
  - Use synchronization mechanisms appropriately
  - Consider using lock-free data structures

  ## 11. Review Checklist

  ### 11.1 Language layer

  - [ ] Kotlin coroutine conventions
  - [ ] Kotlin null safety
  - [ ] Java concurrency handling
  - [ ] Java exception handling

  ### 11.2 Framework layer

  - [ ] Ktor routing management
  - [ ] Ktor middleware usage
  - [ ] Spring controller design
  - [ ] Spring service layer design

  ### 11.3 Performance and security

  - [ ] Database optimisation
  - [ ] Caching strategy
  - [ ] Authentication and authorisation
  - [ ] Input validation

  ### 11.4 Code quality

  - [ ] Code style consistency
  - [ ] Test coverage
  - [ ] Code comment completeness

  ## 12. Summary

  Code review is an important means of ensuring code quality. Through systematic review, potential issues can be discovered and resolved, improving system reliability, performance, and maintainability. This guide provides comprehensive review checkpoints and optimisation suggestions that can be adjusted and extended based on the needs of specific projects.

  Regular code review not only improves code quality, but also promotes knowledge sharing among team members and raises the overall level of development. It is recommended that code review be incorporated into the daily development workflow as part of continuous integration.

prompt_zh: |
  # 后端代码审查与优化指南

  ## 1. 语言层面

  ### 1.1 Kotlin

  **参考文档：**
  - [JetBrains Kotlin技术栈文档（第三方翻译）](https://openaidoc.org/)

  #### 1.1.1 协程规范

  **审查要点：**
  - 确保所有I/O操作使用协程
  - 检查协程作用域管理
  - 验证取消机制的正确实现

  **优化建议：**
  ```kotlin
  // 不推荐
  fun fetchData() {
      Thread { /* 网络请求 */ }.start()
  }

  // 推荐
   suspend fun fetchData() {
      withContext(Dispatchers.IO) {
          // 网络请求
      }
  }
  ```

  #### 1.1.2 空安全

  **审查要点：**
  - 检查可空类型的正确使用
  - 验证空检查的完整性

  **优化建议：**
  ```kotlin
  // 不推荐
  fun processUser(user: User?) {
      if (user != null) {
          // 处理用户
      }
  }

  // 推荐
  fun processUser(user: User) {
      // 处理用户
  }

  fun processNullableUser(user: User?) {
      user?.let {
          // 处理用户
      }
  }
  ```

  #### 1.1.3 扩展函数与属性

  **审查要点：**
  - 检查扩展函数的使用合理性
  - 验证命名规范

  ### 1.2 Java

  #### 1.2.1 并发处理

  **审查要点：**
  - 检查线程池的正确使用
  - 验证同步机制的实现

  **优化建议：**
  ```java
  // 不推荐
  ExecutorService executor = Executors.newFixedThreadPool(10);

  // 推荐
  ExecutorService executor = new ThreadPoolExecutor(
      5, 10, 60L, TimeUnit.SECONDS,
      new LinkedBlockingQueue<>(100),
      new ThreadPoolExecutor.CallerRunsPolicy()
  );
  ```

  #### 1.2.2 异常处理

  **审查要点：**
  - 检查异常的合理使用
  - 验证异常链的完整性

  #### 1.2.3 资源管理

  **审查要点：**
  - 检查资源的正确关闭
  - 验证try-with-resources的使用

  **优化建议：**
  ```java
  // 不推荐
  BufferedReader reader = null;
  try {
      reader = new BufferedReader(new FileReader("file.txt"));
      // 读取文件
  } catch (IOException e) {
      e.printStackTrace();
  } finally {
      if (reader != null) {
          try {
              reader.close();
          } catch (IOException e) {
              e.printStackTrace();
          }
      }
  }

  // 推荐
  try (BufferedReader reader = new BufferedReader(new FileReader("file.txt"))) {
      // 读取文件
  } catch (IOException e) {
      e.printStackTrace();
  }
  ```

  ## 2. 框架层面

  ### 2.1 Ktor

  #### 2.1.1 路由管理

  **审查要点：**
  - 检查路由的组织方式
  - 验证路由处理函数的简洁性

  **优化建议：**
  ```kotlin
  // 推荐
  fun Application.configureRouting() {
      routing {
          apiRoutes()
          adminRoutes()
      }
  }

  private fun Route.apiRoutes() {
      route("/api") {
          get("/users") { /* 处理 */ }
          post("/users") { /* 处理 */ }
      }
  }
  ```

  #### 2.1.2 中间件使用

  **审查要点：**
  - 检查中间件的正确配置
  - 验证中间件的执行顺序

  #### 2.1.3 依赖注入

  **审查要点：**
  - 检查依赖注入的实现方式
  - 验证服务的生命周期管理

  ### 2.2 Spring

  #### 2.2.1 控制器设计

  **审查要点：**
  - 检查控制器的职责分离
  - 验证请求参数的验证

  **优化建议：**
  ```java
  // 推荐
  @RestController
  @RequestMapping("/api/users")
  public class UserController {
      
      private final UserService userService;
      
      public UserController(UserService userService) {
          this.userService = userService;
      }
      
      @GetMapping
      public ResponseEntity<List<User>> getUsers() {
          return ResponseEntity.ok(userService.findAll());
      }
  }
  ```

  #### 2.2.2 服务层设计

  **审查要点：**
  - 检查业务逻辑的封装
  - 验证事务管理的正确实现

  #### 2.2.3 数据访问

  **审查要点：**
  - 检查Repository的设计
  - 验证SQL查询的优化

  **优化建议：**
  ```java
  // 推荐
  @Repository
  public interface UserRepository extends JpaRepository<User, Long> {
      
      @Query("SELECT u FROM User u WHERE u.active = true")
      List<User> findActiveUsers();
  }
  ```

  ## 3. 性能优化

  ### 3.1 数据库优化

  **审查要点：**
  - 检查SQL查询的效率
  - 验证索引的合理使用
  - 检查连接池配置

  ### 3.2 缓存策略

  **审查要点：**
  - 检查缓存的合理使用
  - 验证缓存失效策略

  ### 3.3 网络优化

  **审查要点：**
  - 检查HTTP请求的优化
  - 验证连接复用

  ## 4. 安全性

  ### 4.1 认证与授权

  **审查要点：**
  - 检查认证机制的实现
  - 验证授权策略的完整性

  ### 4.2 输入验证

  **审查要点：**
  - 检查用户输入的验证
  - 验证参数绑定的安全性

  ### 4.3 敏感信息保护

  **审查要点：**
  - 检查敏感信息的存储
  - 验证加密算法的合理使用

  ## 5. 代码质量

  ### 5.1 代码风格

  **审查要点：**
  - 检查代码风格的一致性
  - 验证命名规范的遵循

  ### 5.2 测试覆盖

  **审查要点：**
  - 检查测试用例的完整性
  - 验证测试覆盖率

  ### 5.3 文档

  **审查要点：**
  - 检查代码注释的完整性
  - 验证API文档的准确性

  ## 6. 架构设计

  ### 6.1 模块化

  **审查要点：**
  - 检查模块的合理划分
  - 验证模块间的依赖关系

  ### 6.2 微服务架构

  **审查要点：**
  - 检查服务的边界划分
  - 验证服务间的通信方式

  ### 6.3 可扩展性

  **审查要点：**
  - 检查系统的可扩展性设计
  - 验证负载均衡的实现

  ## 7. 审查流程

  ### 7.1 准备工作

  1. 了解项目架构
  2. 确定审查范围
  3. 准备审查工具

  ### 7.2 执行审查

  1. 代码静态分析
  2. 代码走查
  3. 测试验证

  ### 7.3 报告生成

  1. 整理发现的问题
  2. 提供优化建议
  3. 跟踪问题解决

  ## 8. 工具推荐

  ### 8.1 静态分析工具

  - Kotlin: Detekt
  - Java: SonarQube
  - 通用: Checkstyle

  ### 8.2 性能分析工具

  - JProfiler
  - YourKit
  - VisualVM

  ### 8.3 测试工具

  - JUnit 5
  - Mockito
  - TestContainers

  ## 9. 最佳实践

  ### 9.1 Kotlin最佳实践

  - 使用协程处理异步操作
  - 优先使用不可变数据结构
  - 合理使用扩展函数

  ### 9.2 Java最佳实践

  - 使用try-with-resources管理资源
  - 优先使用接口而非实现
  - 合理使用Stream API

  ### 9.3 框架最佳实践

  - Ktor: 合理组织路由，使用中间件处理横切关注点
  - Spring: 遵循依赖注入原则，合理使用注解

  ## 10. 常见问题与解决方案

  ### 10.1 内存泄漏

  **症状：**
  - 应用内存使用持续增长
  - GC频繁执行

  **解决方案：**
  - 检查对象引用的生命周期
  - 验证资源的正确释放

  ### 10.2 性能瓶颈

  **症状：**
  - 响应时间过长
  - CPU使用率过高

  **解决方案：**
  - 使用性能分析工具定位瓶颈
  - 优化算法和数据结构

  ### 10.3 并发问题

  **症状：**
  - 数据不一致
  - 死锁

  **解决方案：**
  - 合理使用同步机制
  - 考虑使用无锁数据结构

  ## 11. 审查清单

  ### 11.1 语言层面

  - [ ] Kotlin协程规范
  - [ ] Kotlin空安全
  - [ ] Java并发处理
  - [ ] Java异常处理

  ### 11.2 框架层面

  - [ ] Ktor路由管理
  - [ ] Ktor中间件使用
  - [ ] Spring控制器设计
  - [ ] Spring服务层设计

  ### 11.3 性能与安全

  - [ ] 数据库优化
  - [ ] 缓存策略
  - [ ] 认证与授权
  - [ ] 输入验证

  ### 11.4 代码质量

  - [ ] 代码风格一致性
  - [ ] 测试覆盖率
  - [ ] 代码注释完整性

  ## 12. 总结

  代码审查是保证代码质量的重要手段，通过系统性的审查可以发现并解决潜在的问题，提高系统的可靠性、性能和可维护性。本指南提供了全面的审查要点和优化建议，可根据具体项目的需求进行调整和扩展。

  定期的代码审查不仅可以改善代码质量，还可以促进团队成员之间的知识共享，提高整体开发水平。建议将代码审查纳入日常开发流程，作为持续集成的一部分。
  