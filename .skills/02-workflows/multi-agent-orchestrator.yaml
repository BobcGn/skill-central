  ## 4. 阶段 2 —— 子 Agent 分发执行

  ### 4.1 调用 spawn_sub_agent

  对每个子任务，通过 MCP 工具 `spawn_sub_agent` 创建专用子 Agent。

  ### 4.2 System Prompt 动态生成模板

  为每个子 Agent 生成的 System Prompt 必须包含以下四个区块：

  1. **角色定义** — 你是谁，你专注什么
  2. **任务上下文** — 具体要做什么
  3. **接口契约** — 你必须遵守的接口约定
  4. **输出要求** — 结构化 JSON 输出格式

  ### 4.3 执行编排策略

  | 策略 | 触发条件 | 行为 |
  |------|---------|------|
  | **并行分发** | 子任务间无依赖 | 同时 spawn 所有无依赖子 Agent |
  | **串行分发** | 子任务存在依赖链 | 按拓扑排序依次执行 |
  | **条件分发** | 子任务执行结果影响后续任务 | 等待前置结果，动态调整后续任务上下文 |

  ---

  ## 5. 阶段 3 —— 战报汇总与代码审查

  ### 5.1 汇总流程

  1. 收集所有子 Agent 的结构化输出
  2. 验证接口契约一致性
  3. 检测文件冲突
  4. 合并代码变更
  5. 执行集成级 lint / 编译检查
  6. 生成最终交付报告

  ### 5.2 接口对齐验证（硬性门禁）

  对每一条接口契约，验证提供方和消费方的签名是否匹配。
  不匹配则 🔴 BLOCK，生成差异报告，要求修复。

  ---

  ## 6. 禁止模式

  | # | 禁止行为 | 违反后果 |
  |---|---------|----------|
  | F1 | 尚书令自己编写业务逻辑代码 | 立即中止，输出调度计划 |
  | F2 | 子 Agent 之间直接通信或共享状态 | 丢弃违规输出，重新分发 |
  | F3 | 子 Agent 调用 spawn_sub_agent（嵌套创建） | 终止该子 Agent |
  | F4 | 跳过接口对齐验证直接交付 | 禁止向用户展示结果 |
  | F5 | 在子 Agent 执行期间修改其任务上下文 | 终止受影响的子 Agent |
  | F6 | 将超过 3 个技术域合并到同一个子 Agent | 拆分为更细粒度的子任务 |

  ---

  ## 7. 降级策略

  | 场景 | 降级方案 |
  |------|---------|
  | spawn_sub_agent 不可用 | 回退为单 Agent 模式，串行执行 |
  | 子 Agent 超时 | 重试一次；仍失败则拆分重发 |
  | 接口对齐失败 | 暂停后续任务，生成差异报告 |
  | 所有子任务失败 | 完全回退，请求人工介入 |

  ---

  ## 8. 与 Agentic Loop Orchestrator 的协作

  尚书令（priority 35）与 Agentic Loop（priority 50）的关系：

  - 尚书令完成调度后，可选触发 Mode B 质量门禁
  - Agentic Loop 发现多模块修复需求时，可触发尚书令模式
  - 两者同时激活时，**Agentic Loop 优先**，尚书令作为其执行策略

  ---

  ## 9. 集成触发点

  - 用户说"拆分任务"、"分发给多个 Agent"、"并行处理"
  - 需求分析检测到 2+ 独立技术域
  - PR 涉及多个模块变更
  - 架构评审需要多角色协作
