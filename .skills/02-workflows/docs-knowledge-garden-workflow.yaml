# 首席史官（Chief Historian）工作流。在项目迭代、架构决策、技术探索完成时，
# 自动沉淀知识。执行"内外有别"的文档双轨制：私有库 vs 开源知识花园。
#
# Priority 25 — 高于全局上下文（10），低于尚书令调度（35）和质量循环（50），
# 确保知识沉淀在开发流程中被触发但不阻塞核心调度与质量门禁。
