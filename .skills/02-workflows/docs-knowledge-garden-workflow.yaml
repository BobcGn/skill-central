  ```markdown
  ## 决策记录: [名称]
  - 背景 / 决策 / 理由 / 被拒绝的方案 / 影响 / 后续跟进
  ```

  ### Phase 4: 最佳实践总结
  从具体实现 → 模式抽象 → 通用建议 → 决策框架。

  ### Phase 5: 润色与发布
  按归属执行：私有库直接写入，开源区需通过质量门禁。

  ---

  ## 5. 质量门禁

  | 检查项 | 等级 |
  |--------|------|
  | YAML Frontmatter 必填字段完整 | BLOCKING |
  | 无敏感信息 | BLOCKING |
  | 包含问题背景和决策理由 | BLOCKING |
  | 内部链接使用 `[[双向链接]]` | WARNING |
  | 标签包含技术栈/架构关键词 | WARNING |

  ---

  ## 6. 禁止模式

  | # | 禁止行为 |
  |---|---------|
  | D1 | 未经确认就发布到开源区 |
  | D2 | 在开源文档中暴露敏感信息 |
  | D3 | 只记录 How 不记录 Why |
  | D4 | 文档间不使用双向链接 |
  | D5 | 将未成熟实验直接发布到开源区 |
