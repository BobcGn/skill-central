id: docs-knowledge-garden-workflow
name: Knowledge Garden Workflow (首席史官工作流)
description: >
  在架构决策、技术探索或代码讨论完成后，自动沉淀知识。执行文档双轨制
  （私有库 vs 开源知识花园），从代码/讨论中提炼核心痛点、决策过程和最佳实践。
type: prompt
priority: 25
