  | `timeout_seconds` | 30-300 | 使用默认值 120 |

  ---

  ## 2. 沙盒隔离原则

  ### 2.1 隔离层级

  | 层级 | 隔离内容 | 实现方式 |
  |------|---------|---------|
  | 上下文隔离 | 对话历史、System Prompt | 独立上下文窗口 |
  | 工具隔离 | 可用工具集 | 白名单强制执行 |
  | 文件系统隔离 | 可操作的文件范围 | 路径白名单校验 |
  | 权限隔离 | 网络访问、系统命令 | restricted 模式 |
  | 输出隔离 | 返回值与主 Agent 分离 | 结构化回调 |

  ### 2.2 隔离执行规则

  | # | 规则 | 等级 |
  |---|------|------|
  | S1 | 子 Agent 不得访问主 Agent 的对话历史 | HARD |
  | S2 | 子 Agent 不得使用 allowed_tools 之外的工具 | HARD |
  | S3 | 子 Agent 不得操作 target_files 之外的文件 | HARD |
  | S4 | 子 Agent 的输出必须通过标准回调结构返回 | HARD |
  | S5 | 子 Agent 不得向外部服务发送未经审计的数据 | HARD |

  ---

  ## 3. 防无限套娃机制

  ### 3.1 核心约束

  | 参数 | 值 | 说明 |
  |------|-----|------|
  | `max_depth` | **1** | 子 Agent 只执行具体任务，不得再次创建 Agent |
  | `max_agents_per_dispatch` | **10** | 单次调度最多 10 个子 Agent |
  | `max_total_agents` | **20** | 会话生命周期最多 20 个子 Agent |

  ### 3.2 硬性规定

  **`max_depth = 1` —— 武将不得再次点将。这是硬性限制，不可覆盖。**

  - 层级 0: 尚书令 —— 可以调用 spawn_sub_agent
  - 层级 1: 武将 —— 执行任务，禁止调用 spawn_sub_agent

  ### 3.3 实现机制

  | 机制 | 说明 |
  |------|------|
  | 工具可用性控制 | allowed_tools 白名单中永远不包含 spawn_sub_agent |
  | System Prompt 注入 | 自动追加禁止嵌套创建的指令 |
  | 运行时拦截 | 即使绕过前两层，运行时也会拦截 |

  ---

  ## 4. 标准回调数据结构

  ### 4.1 成功回调

  ```json
  {
    "callback_type": "task_complete",
    "task_id": "T-001",
    "role_name": "Compose-UI-Expert",
    "status": "success",
    "execution_summary": {
      "description": "...",
      "duration_ms": 45000,
      "files_created": ["..."],
      "files_modified": [],
      "lines_added": 187,
      "lines_removed": 0
    },
    "code_changes": { ... },
    "interfaces_exposed": [ { "name": "...", "signature": "..." } ],
    "interfaces_consumed": [ { "name": "...", "expected_signature": "..." } ],
    "test_suggestions": [ { "type": "unit", "description": "..." } ],
    "warnings": [],
    "notes": "..."
  }
  ```

  ### 4.2 失败回调

  ```json
  {
    "callback_type": "task_failed",
    "task_id": "T-002",
    "status": "failed",
    "error": {
      "code": "DEPENDENCY_NOT_SATISFIED",
      "message": "...",
      "recoverable": true,
      "suggested_action": "..."
    },
    "execution_summary": { ... },
    "partial_output": { ... }
  }
  ```

  ### 4.3 违规回调

  ```json
  {
    "callback_type": "violation",
    "task_id": "T-003",
    "status": "terminated",
    "violation": {
      "type": "RECURSION_VIOLATION",
      "detail": "子 Agent 尝试调用 spawn_sub_agent",
      "severity": "critical"
    }
  }
  ```

  ---

  ## 5. 错误码枚举

  | 错误码 | 含义 | 可恢复 |
  |--------|------|--------|
  | `DEPENDENCY_NOT_SATISFIED` | 前置依赖未完成 | ✅ |
  | `TOOL_ACCESS_DENIED` | 未授权的工具访问 | ❌ |
  | `FILE_ACCESS_DENIED` | 未授权的文件访问 | ❌ |
  | `RECURSION_VIOLATION` | 嵌套创建 Agent | ❌ |
  | `TASK_TIMEOUT` | 执行超时 | ✅ |
  | `OUTPUT_FORMAT_ERROR` | 输出格式错误 | ✅ |

  ---

  ## 6. 审计日志

  每次 spawn_sub_agent 调用必须记录审计信息：agent_spawned 事件和 agent_completed 事件，
  包含时间戳、Agent ID、任务 ID、工具列表、文件数、耗时、违规数等字段。

  ---

  ## 7. 版本与演进

  - `max_depth` 永远为 1，不随版本变化
  - 新增 `allowed_tools` 枚举值需架构评审
  - 回调结构新增字段必须可选（向后兼容）
  - 删除或修改现有字段需 major version bump
