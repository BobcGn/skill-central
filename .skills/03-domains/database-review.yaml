prompt: |
  # Database Review & Optimization Guide

  ## 1. Database Dialect Selection

  Before starting a database review, please tell me which database dialect you are using so that more accurate optimization suggestions and example code can be provided. Supported database dialects include:

  - MySQL
  - PostgreSQL
  - Oracle
  - SQL Server
  - TiDB
  - Other (please specify)

  ## 2. Database Design Principles

  ### 2.1 Design Essentials

  **Review focus:**
  - Check adherence to database normal forms (third normal form is usually recommended)
  - Validate the reasonableness of table-relationship design
  - Check whether data-type choices are appropriate
  - Validate table-size estimates and scalability considerations

  **Optimization suggestions:**
  - Split tables appropriately to avoid data redundancy
  - Choose appropriate data types to save storage space
  - Account for future data growth and design scalable table structures

  **Example:**
  ```sql
  -- Example of a reasonable table-structure design
  CREATE TABLE users (
      id INT PRIMARY KEY AUTO_INCREMENT,
      username VARCHAR(50) NOT NULL UNIQUE,
      email VARCHAR(100) NOT NULL UNIQUE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
  );

  CREATE TABLE orders (
      id INT PRIMARY KEY AUTO_INCREMENT,
      user_id INT NOT NULL,
      order_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      total_amount DECIMAL(10, 2) NOT NULL,
      FOREIGN KEY (user_id) REFERENCES users(id)
  );
  ```

  ## 3. Database and Table Creation Conventions

  ### 3.1 Naming Conventions

  **Review focus:**
  - Check whether table names and column names follow a unified naming convention
  - Validate that index and constraint names are clear
  - Check whether database-object names are descriptive

  **Optimization suggestions:**
  - Use lowercase letters and underscores for names (e.g., `user_info`)
  - Avoid using reserved words as object names
  - Use singular form for table names (e.g., `user` rather than `users`)
  - Use the `idx_<table>_<column>` format for index names

  ### 3.2 Primary Key and Foreign Key Design

  **Review focus:**
  - Check whether the primary-key choice is appropriate
  - Validate that foreign-key relationships are set up correctly
  - Check whether auto-increment fields are used sensibly

  **Optimization suggestions:**
  - Prefer auto-increment integers as primary keys
  - Foreign-key column types must match the related primary key
  - Configure cascade operations on foreign-key constraints appropriately

  ### 3.3 Constraint Settings

  **Review focus:**
  - Check NOT NULL constraint settings
  - Validate the use of UNIQUE constraints
  - Check CHECK constraints and default values

  **Optimization suggestions:**
  - Apply NOT NULL constraints to required columns
  - Apply UNIQUE constraints to columns that must be unique
  - Use default values appropriately to reduce NULLs

  ### 3.4 Drop-Create-Use Format

  **Review focus:**
  - Check whether the drop-create-use format is used for database and table creation
  - Validate that database and table drops and creates are handled correctly
  - Check whether the database is used correctly

  **Optimization suggestions:**
  - Use the drop-create-use format to ensure environment consistency
  - Perform necessary backups before drop operations
  - Ensure the correct order when creating and using the database

  **Example:**
  ```sql
  -- MySQL drop-create-use example
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
  USE mydb;

  DROP TABLE IF EXISTS categories;
  CREATE TABLE categories (
      category_id INT PRIMARY KEY AUTO_INCREMENT,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  DROP TABLE IF EXISTS products;
  CREATE TABLE products (
      product_id INT PRIMARY KEY AUTO_INCREMENT,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uk_product_name (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- PostgreSQL drop-create-use example
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb;
  \c mydb;

  DROP TABLE IF EXISTS products;
  DROP TABLE IF EXISTS categories;

  CREATE TABLE categories (
      category_id SERIAL PRIMARY KEY,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id SERIAL PRIMARY KEY,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      UNIQUE (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- Oracle drop-create-use example
  -- Note: Oracle requires connecting to the default database first, then creating a user and tablespace
  DROP USER mydb CASCADE;
  CREATE USER mydb IDENTIFIED BY mypassword;
  GRANT CONNECT, RESOURCE TO mydb;

  ALTER SESSION SET CURRENT_SCHEMA = mydb;

  DROP TABLE products;
  DROP TABLE categories;

  CREATE TABLE categories (
      category_id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      category_name VARCHAR2(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      product_name VARCHAR2(100) NOT NULL,
      price NUMBER(10, 2) NOT NULL CHECK (price > 0),
      stock NUMBER NOT NULL DEFAULT 0,
      category_id NUMBER,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      CONSTRAINT uk_product_name UNIQUE (product_name),
      CONSTRAINT fk_category FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- SQL Server drop-create-use example
  USE master;
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb;
  USE mydb;

  DROP TABLE IF EXISTS products;
  DROP TABLE IF EXISTS categories;

  CREATE TABLE categories (
      category_id INT PRIMARY KEY IDENTITY(1,1),
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id INT PRIMARY KEY IDENTITY(1,1),
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at DATETIME DEFAULT GETDATE(),
      updated_at DATETIME DEFAULT GETDATE(),
      CONSTRAINT uk_product_name UNIQUE (product_name),
      CONSTRAINT fk_category FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- TiDB drop-create-use example
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
  USE mydb;

  DROP TABLE IF EXISTS categories;
  CREATE TABLE categories (
      category_id INT PRIMARY KEY AUTO_INCREMENT,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  DROP TABLE IF EXISTS products;
  CREATE TABLE products (
      product_id INT PRIMARY KEY AUTO_INCREMENT,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uk_product_name (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );
  ```

  ## 4. Index Optimization

  ### 4.1 Index Design

  **Review focus:**
  - Check whether indexes are created on frequently queried columns
  - Validate index selectivity
  - Check whether composite-index column order is reasonable
  - Validate whether redundant indexes exist

  **Optimization suggestions:**
  - Create indexes on WHERE clause, JOIN conditions, and ORDER BY columns
  - Place high-selectivity columns first in composite indexes
  - Avoid creating indexes on low-selectivity columns
  - Clean up redundant indexes regularly

  ### 4.2 Index Type Selection

  **Review focus:**
  - Check whether an appropriate index type is chosen for each use case
  - Validate the use of special indexes such as full-text and spatial indexes

  **Optimization suggestions:**
  - B-tree index: suitable for most scenarios
  - Hash index: suitable for equality lookups
  - Full-text index: suitable for text search
  - Spatial index: suitable for geographic data

  ### 4.3 Index Maintenance

  **Review focus:**
  - Check index fragmentation
  - Validate that index statistics are up to date
  - Check whether indexes are rebuilt or reorganized regularly

  **Optimization suggestions:**
  - Run regular ANALYZE operations to update statistics
  - Rebuild heavily fragmented indexes
  - Monitor index usage and drop unused indexes

  **Example:**
  ```sql
  -- MySQL index creation example
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);

  -- PostgreSQL index creation example
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);

  -- Oracle index creation example
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);
  ```

  ## 5. SQL Query Optimization

  ### 5.1 Query Statement Optimization

  **Review focus:**
  - Check whether `SELECT *` is used
  - Validate WHERE clause condition ordering
  - Check whether functions are applied to indexed columns
  - Validate whether unnecessary computation is avoided

  **Optimization suggestions:**
  - Select only the columns you need
  - Place high-selectivity conditions earlier in the WHERE clause
  - Avoid applying functions to indexed columns in the WHERE clause
  - Prefer INNER JOIN over OUTER JOIN

  ### 5.2 Join Query Optimization

  **Review focus:**
  - Check the join table order
  - Validate that join conditions use indexes
  - Check whether Cartesian products are avoided

  **Optimization suggestions:**
  - Drive large tables with small tables
  - Ensure join conditions use indexes
  - Use join types (INNER, LEFT, RIGHT) appropriately

  ### 5.3 Subquery Optimization

  **Review focus:**
  - Check whether subqueries can be rewritten as joins
  - Validate whether correlated subqueries are used
  - Check whether EXISTS can replace IN

  **Optimization suggestions:**
  - Prefer joins over subqueries
  - Avoid correlated subqueries
  - When the subquery result set is large, use EXISTS instead of IN

  **Example:**
  ```sql
  -- Before optimization
  SELECT * FROM orders WHERE user_id IN (SELECT id FROM users WHERE status = 'active');

  -- After optimization
  SELECT o.* FROM orders o JOIN users u ON o.user_id = u.id WHERE u.status = 'active';

  -- Before optimization
  SELECT * FROM users WHERE id IN (SELECT user_id FROM orders WHERE amount > 1000);

  -- After optimization
  SELECT * FROM users u WHERE EXISTS (SELECT 1 FROM orders o WHERE o.user_id = u.id AND o.amount > 1000);
  ```

  ## 6. Transaction Management

  ### 6.1 Transaction Usage

  **Review focus:**
  - Check whether transaction boundaries are reasonable
  - Validate whether long-running transactions are avoided
  - Check whether transaction exceptions are handled correctly

  **Optimization suggestions:**
  - Keep transactions as short as possible
  - Include only the necessary operations in a transaction
  - Handle transaction rollbacks correctly

  ### 6.2 Transaction Isolation Levels

  **Review focus:**
  - Check whether an appropriate isolation level is selected for the business requirement
  - Validate that the impact of different isolation levels is understood

  **Optimization suggestions:**
  - Use READ COMMITTED for most scenarios
  - Use REPEATABLE READ or SERIALIZABLE for scenarios requiring high data consistency
  - Use READ UNCOMMITTED for high-performance scenarios (mind the dirty-read risk)

  ### 6.3 Deadlock Prevention

  **Review focus:**
  - Check for circular dependencies
  - Validate that the operation order across transactions is consistent
  - Check whether timeout mechanisms are used

  **Optimization suggestions:**
  - Have all transactions operate on resources in the same order
  - Avoid waiting for user input inside a transaction
  - Configure reasonable transaction timeouts
  - Use optimistic locking instead of pessimistic locking

  **Example:**
  ```sql
  -- MySQL transaction example
  START TRANSACTION;
  TRY {
      UPDATE accounts SET balance = balance - 100 WHERE id = 1;
      UPDATE accounts SET balance = balance + 100 WHERE id = 2;
      COMMIT;
  } CATCH {
      ROLLBACK;
      THROW;
  }

  -- PostgreSQL transaction example
  BEGIN;
  UPDATE accounts SET balance = balance - 100 WHERE id = 1;
  UPDATE accounts SET balance = balance + 100 WHERE id = 2;
  COMMIT;

  -- Oracle transaction example
  BEGIN
      UPDATE accounts SET balance = balance - 100 WHERE id = 1;
      UPDATE accounts SET balance = balance + 100 WHERE id = 2;
      COMMIT;
  EXCEPTION
      WHEN OTHERS THEN
          ROLLBACK;
          RAISE;
  END;
  ```

  ## 7. Database Performance Tuning

  ### 7.1 Configuration Optimization

  **Review focus:**
  - Check database memory configuration
  - Validate buffer-size settings
  - Check concurrent-connection settings
  - Validate log configuration

  **Optimization suggestions:**
  - Set `innodb_buffer_pool_size` appropriately for MySQL based on server memory
  - Tune `shared_buffers` for PostgreSQL
  - Configure `max_connections` appropriately
  - Optimize log level and flush policy

  ### 7.2 Connection Pool Settings

  **Review focus:**
  - Check whether the connection-pool size is reasonable
  - Validate connection-timeout settings
  - Check whether a connection pool is in use

  **Optimization suggestions:**
  - Size the connection pool based on concurrency
  - Set reasonable connection timeout and idle timeout
  - Use a database connection pool to manage connections

  ### 7.3 Cache Usage

  **Review focus:**
  - Check whether query caching is used
  - Validate the application-layer caching strategy
  - Check whether a cache system such as Redis is in use

  **Optimization suggestions:**
  - Use query caching appropriately (mind cache-invalidation issues)
  - Use application-layer caching for hot data
  - Consider an in-memory data store such as Redis to cache frequently accessed data

  **Example:**
  ```sql
  -- MySQL configuration optimization example
  SET GLOBAL innodb_buffer_pool_size = 4G;
  SET GLOBAL max_connections = 200;
  SET GLOBAL query_cache_size = 64M;

  -- PostgreSQL configuration optimization example
  -- Set in postgresql.conf
  shared_buffers = 1GB
  work_mem = 32MB
  maintenance_work_mem = 256MB
  max_connections = 200

  -- Oracle configuration optimization example
  -- Set via ALTER SYSTEM commands
  ALTER SYSTEM SET sga_target = '4G' SCOPE=SPFILE;
  ALTER SYSTEM SET pga_aggregate_target = '2G' SCOPE=SPFILE;
  ```

  ## 8. Database Security

  ### 8.1 Permission Management

  **Review focus:**
  - Check whether the principle of least privilege is followed
  - Validate user-permission settings
  - Check whether permissions are audited regularly

  **Optimization suggestions:**
  - Grant different permissions to different roles
  - Avoid using superuser accounts for daily operations
  - Review and revoke unnecessary permissions regularly

  ### 8.2 Data Encryption

  **Review focus:**
  - Check whether sensitive data is stored encrypted
  - Validate that encryption in transit is enabled
  - Check the password-storage method

  **Optimization suggestions:**
  - Use encrypted storage for sensitive data
  - Enable SSL/TLS for data in transit
  - Store passwords using salted hashes

  ### 8.3 SQL Injection Prevention

  **Review focus:**
  - Check whether parameterized queries are used
  - Validate that input validation is strict
  - Check whether an ORM framework is in use

  **Optimization suggestions:**
  - Always use parameterized queries
  - Apply strict validation to user input
  - When using an ORM framework, still guard against SQL injection
  - Avoid string-concatenated SQL

  **Example:**
  ```sql
  -- Unsafe SQL (vulnerable to SQL injection)
  SELECT * FROM users WHERE username = '$username' AND password = '$password';

  -- Safe parameterized query
  -- MySQL
  PREPARE stmt FROM 'SELECT * FROM users WHERE username = ? AND password = ?';
  EXECUTE stmt USING @username, @password;

  -- PostgreSQL
  PREPARE stmt AS SELECT * FROM users WHERE username = $1 AND password = $2;
  EXECUTE stmt('admin', 'pass123');

  -- Oracle
  DECLARE
      v_username VARCHAR2(50) := 'admin';
      v_password VARCHAR2(50) := 'pass123';
  BEGIN
      EXECUTE IMMEDIATE 'SELECT * FROM users WHERE username = :1 AND password = :2'
      USING v_username, v_password;
  END;
  ```

  ## 9. Best Practices

  ### 9.1 Database Design Best Practices

  - Follow database-normal-form design principles
  - Split tables appropriately and avoid oversized tables
  - Choose appropriate data types
  - Set a primary key on every table
  - Use foreign keys to guarantee data consistency

  ### 9.2 Index Usage Best Practices

  - Create indexes only on frequently queried columns
  - Composite indexes must respect the leftmost-prefix rule
  - Avoid creating too many indexes on frequently updated columns
  - Maintain and tune indexes regularly
  - Monitor index usage

  ### 9.3 SQL Authoring Best Practices

  - Select only the columns you need
  - Use parameterized queries
  - Avoid `SELECT *`
  - Use JOINs sensibly and avoid Cartesian products
  - Optimize subqueries; consider rewriting as joins

  ### 9.4 Performance Tuning Best Practices

  - Analyze tables and refresh statistics regularly
  - Monitor the slow-query log
  - Configure database parameters appropriately
  - Use a connection pool to manage connections
  - Cache hot data

  ## 10. Common Issues and Solutions

  ### 10.1 Performance Bottlenecks

  **Symptoms:**
  - Slow query execution
  - High database CPU usage
  - Continuously growing connection count

  **Solutions:**
  - Analyze the slow-query log and tune slow SQL
  - Add indexes to critical queries
  - Tune database configuration parameters
  - Consider sharding or read/write splitting

  ### 10.2 Deadlocks

  **Symptoms:**
  - Transactions hang during execution
  - Deadlock errors appear

  **Solutions:**
  - Operate on resources in the same order
  - Reduce transaction scope and duration
  - Use optimistic locking instead of pessimistic locking
  - Configure reasonable transaction timeouts

  ### 10.3 Data Consistency

  **Symptoms:**
  - Data mismatches
  - Foreign-key constraint failures

  **Solutions:**
  - Use transactions to guarantee operation atomicity
  - Set foreign-key constraints correctly
  - Avoid implementing constraint logic in the application layer
  - Validate data consistency regularly

  ### 10.4 Scalability

  **Symptoms:**
  - Performance degrades as data volume grows
  - Single-database or single-table limits

  **Solutions:**
  - Shard the database
  - Separate reads from writes
  - Vertical and horizontal table splitting
  - Consider a distributed database

  ## 11. Review Checklists

  ### 11.1 Database Design Review Checklist

  - [ ] Adherence to database normal forms
  - [ ] Reasonableness of table-structure design
  - [ ] Appropriateness of data-type choices
  - [ ] Primary-key and foreign-key design
  - [ ] Constraint settings
  - [ ] Adherence to naming conventions

  ### 11.2 Index Review Checklist

  - [ ] Indexes on frequently queried columns
  - [ ] Reasonable index selectivity
  - [ ] Correct composite-index column order
  - [ ] No redundant indexes
  - [ ] Index maintenance performed regularly
  - [ ] Unused indexes removed

  ### 11.3 SQL Query Review Checklist

  - [ ] `SELECT *` is not used
  - [ ] WHERE clause conditions are reasonable
  - [ ] No functions applied to indexed columns
  - [ ] Join queries are optimized
  - [ ] Subqueries are reasonable
  - [ ] Parameterized queries are used

  ### 11.4 Performance and Security Review Checklist

  - [ ] Database configuration is tuned
  - [ ] Connection-pool settings are reasonable
  - [ ] Caching strategy is effective
  - [ ] Permissions follow the principle of least privilege
  - [ ] Sensitive data is encrypted
  - [ ] SQL injection is guarded against

  ## 12. Recommended Tools

  ### 12.1 Database Design Tools

  - **MySQL Workbench**: official MySQL design tool
  - **pgAdmin**: PostgreSQL management tool
  - **Oracle SQL Developer**: official Oracle tool
  - **Navicat**: multi-database management tool
  - **ER/Studio**: professional database design tool

  ### 12.2 Performance Analysis Tools

  - **MySQL Enterprise Monitor**: MySQL performance monitoring
  - **pg_stat_statements**: PostgreSQL query analysis
  - **Oracle Enterprise Manager**: Oracle performance monitoring
  - **Percona Monitoring and Management**: open-source database monitoring
  - **pt-query-digest**: slow-query analysis tool

  ### 12.3 Monitoring Tools

  - **Prometheus + Grafana**: general-purpose monitoring solution
  - **Zabbix**: integrated monitoring tool
  - **Datadog**: cloud-native monitoring
  - **Nagios**: traditional monitoring tool

  ## 13. Summary

  Database review and optimization is a critical part of ensuring system performance and reliability. A systematic review surfaces and resolves latent issues, improving database performance and maintainability.

  This guide provides a comprehensive set of review points and optimization suggestions covering database design, index optimization, SQL query optimization, performance tuning, and security. In practice, choose the right optimization strategy for the specific database dialect and business scenario.

  Routine database review not only improves system performance but also extends the database's service life and lowers operations cost. Incorporate database review into day-to-day development and operations workflows as part of continuous integration.

prompt_zh: |
  # 数据库审查与优化指南

  ## 1. 数据库方言选择

  在开始数据库审查之前，请告知您使用的数据库方言，以便提供更准确的优化建议和示例代码。支持的数据库方言包括：

  - MySQL
  - PostgreSQL
  - Oracle
  - SQL Server
  - TiDB
  - 其他（请指定）

  ## 2. 数据库设计原则

  ### 2.1 设计要点

  **审查要点：**
  - 检查数据库范式遵循情况（通常建议第三范式）
  - 验证表关系设计合理性
  - 检查数据类型选择是否合适
  - 验证表大小预估和扩展性考虑

  **优化建议：**
  - 合理拆分表以避免数据冗余
  - 选择合适的数据类型以节省存储空间
  - 考虑未来数据增长，设计具有扩展性的表结构

  **示例：**
  ```sql
  -- 合理的表结构设计示例
  CREATE TABLE users (
      id INT PRIMARY KEY AUTO_INCREMENT,
      username VARCHAR(50) NOT NULL UNIQUE,
      email VARCHAR(100) NOT NULL UNIQUE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
  );

  CREATE TABLE orders (
      id INT PRIMARY KEY AUTO_INCREMENT,
      user_id INT NOT NULL,
      order_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      total_amount DECIMAL(10, 2) NOT NULL,
      FOREIGN KEY (user_id) REFERENCES users(id)
  );
  ```

  ## 3. 建库建表规范

  ### 3.1 命名规范

  **审查要点：**
  - 检查表名、字段名是否遵循统一命名规范
  - 验证索引、约束的命名是否清晰
  - 检查数据库对象命名是否具有描述性

  **优化建议：**
  - 使用小写字母和下划线命名（如user_info）
  - 避免使用保留字作为对象名
  - 表名使用单数形式（如user而非users）
  - 索引名使用idx_表名_字段名格式

  ### 3.2 主键和外键设计

  **审查要点：**
  - 检查主键选择是否合适
  - 验证外键关系是否正确设置
  - 检查自增字段使用合理性

  **优化建议：**
  - 优先使用自增整数作为主键
  - 外键字段类型应与关联主键一致
  - 合理设置外键约束的级联操作

  ### 3.3 约束条件设置

  **审查要点：**
  - 检查非空约束设置
  - 验证唯一约束使用
  - 检查检查约束和默认值设置

  **优化建议：**
  - 对必要字段设置非空约束
  - 对需要唯一的字段设置唯一约束
  - 合理使用默认值减少NULL值

  ### 3.4 drop-create-use格式

  **审查要点：**
  - 检查是否使用drop-create-use格式进行建库建表
  - 验证是否正确处理数据库和表的删除与创建
  - 检查是否正确使用数据库

  **优化建议：**
  - 使用drop-create-use格式确保环境一致性
  - 在删除操作前进行必要的备份
  - 确保创建和使用数据库的顺序正确

  **示例：**
  ```sql
  -- MySQL drop-create-use格式示例
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
  USE mydb;

  DROP TABLE IF EXISTS categories;
  CREATE TABLE categories (
      category_id INT PRIMARY KEY AUTO_INCREMENT,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  DROP TABLE IF EXISTS products;
  CREATE TABLE products (
      product_id INT PRIMARY KEY AUTO_INCREMENT,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uk_product_name (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- PostgreSQL drop-create-use格式示例
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb;
  \c mydb;

  DROP TABLE IF EXISTS products;
  DROP TABLE IF EXISTS categories;

  CREATE TABLE categories (
      category_id SERIAL PRIMARY KEY,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id SERIAL PRIMARY KEY,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      UNIQUE (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- Oracle drop-create-use格式示例
  -- 注意：Oracle需要先连接到默认数据库，然后创建用户和表空间
  DROP USER mydb CASCADE;
  CREATE USER mydb IDENTIFIED BY mypassword;
  GRANT CONNECT, RESOURCE TO mydb;

  ALTER SESSION SET CURRENT_SCHEMA = mydb;

  DROP TABLE products;
  DROP TABLE categories;

  CREATE TABLE categories (
      category_id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      category_name VARCHAR2(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id NUMBER GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
      product_name VARCHAR2(100) NOT NULL,
      price NUMBER(10, 2) NOT NULL CHECK (price > 0),
      stock NUMBER NOT NULL DEFAULT 0,
      category_id NUMBER,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      CONSTRAINT uk_product_name UNIQUE (product_name),
      CONSTRAINT fk_category FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- SQL Server drop-create-use格式示例
  USE master;
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb;
  USE mydb;

  DROP TABLE IF EXISTS products;
  DROP TABLE IF EXISTS categories;

  CREATE TABLE categories (
      category_id INT PRIMARY KEY IDENTITY(1,1),
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  CREATE TABLE products (
      product_id INT PRIMARY KEY IDENTITY(1,1),
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at DATETIME DEFAULT GETDATE(),
      updated_at DATETIME DEFAULT GETDATE(),
      CONSTRAINT uk_product_name UNIQUE (product_name),
      CONSTRAINT fk_category FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );

  -- TiDB drop-create-use格式示例
  DROP DATABASE IF EXISTS mydb;
  CREATE DATABASE mydb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
  USE mydb;

  DROP TABLE IF EXISTS categories;
  CREATE TABLE categories (
      category_id INT PRIMARY KEY AUTO_INCREMENT,
      category_name VARCHAR(50) NOT NULL UNIQUE
  );

  DROP TABLE IF EXISTS products;
  CREATE TABLE products (
      product_id INT PRIMARY KEY AUTO_INCREMENT,
      product_name VARCHAR(100) NOT NULL,
      price DECIMAL(10, 2) NOT NULL CHECK (price > 0),
      stock INT NOT NULL DEFAULT 0,
      category_id INT,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uk_product_name (product_name),
      FOREIGN KEY (category_id) REFERENCES categories(category_id)
  );
  ```

  ## 4. 索引优化

  ### 4.1 索引设计

  **审查要点：**
  - 检查是否为常用查询字段创建索引
  - 验证索引选择性
  - 检查复合索引顺序是否合理
  - 验证是否存在冗余索引

  **优化建议：**
  - 为WHERE子句、JOIN条件、ORDER BY字段创建索引
  - 复合索引应将选择性高的字段放在前面
  - 避免在低选择性字段上创建索引
  - 定期清理冗余索引

  ### 4.2 索引类型选择

  **审查要点：**
  - 检查是否根据使用场景选择合适的索引类型
  - 验证全文索引、空间索引等特殊索引的使用

  **优化建议：**
  - B-tree索引：适用于大多数场景
  - Hash索引：适用于等值查询
  - 全文索引：适用于文本搜索
  - 空间索引：适用于地理数据

  ### 4.3 索引维护

  **审查要点：**
  - 检查索引碎片情况
  - 验证索引统计信息是否最新
  - 检查是否定期重建或重组索引

  **优化建议：**
  - 定期分析表以更新统计信息
  - 对碎片化严重的索引进行重建
  - 监控索引使用情况，移除未使用的索引

  **示例：**
  ```sql
  -- MySQL索引创建示例
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);

  -- PostgreSQL索引创建示例
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);

  -- Oracle索引创建示例
  CREATE INDEX idx_users_email ON users(email);
  CREATE INDEX idx_orders_user_id ON orders(user_id);
  CREATE INDEX idx_orders_user_date ON orders(user_id, order_date);
  ```

  ## 5. SQL查询优化

  ### 5.1 查询语句优化

  **审查要点：**
  - 检查是否使用SELECT *
  - 验证WHERE子句条件顺序
  - 检查是否使用函数操作索引列
  - 验证是否避免了不必要的计算

  **优化建议：**
  - 只选择需要的列
  - 将选择性高的条件放在WHERE子句前面
  - 避免在WHERE子句中对索引列使用函数
  - 优先使用INNER JOIN而非OUTER JOIN

  ### 5.2 连接查询优化

  **审查要点：**
  - 检查连接表顺序
  - 验证连接条件是否使用索引
  - 检查是否避免了笛卡尔积

  **优化建议：**
  - 小表驱动大表
  - 确保连接条件使用索引
  - 合理使用连接类型（INNER、LEFT、RIGHT）

  ### 5.3 子查询优化

  **审查要点：**
  - 检查子查询是否可以优化为连接查询
  - 验证是否使用了相关子查询
  - 检查是否可以使用EXISTS替代IN

  **优化建议：**
  - 优先使用连接查询替代子查询
  - 避免使用相关子查询
  - 当子查询结果集较大时，使用EXISTS替代IN

  **示例：**
  ```sql
  -- 优化前
  SELECT * FROM orders WHERE user_id IN (SELECT id FROM users WHERE status = 'active');

  -- 优化后
  SELECT o.* FROM orders o JOIN users u ON o.user_id = u.id WHERE u.status = 'active';

  -- 优化前
  SELECT * FROM users WHERE id IN (SELECT user_id FROM orders WHERE amount > 1000);

  -- 优化后
  SELECT * FROM users u WHERE EXISTS (SELECT 1 FROM orders o WHERE o.user_id = u.id AND o.amount > 1000);
  ```

  ## 6. 事务管理

  ### 6.1 事务使用

  **审查要点：**
  - 检查事务边界是否合理
  - 验证是否避免了长事务
  - 检查是否正确处理事务异常

  **优化建议：**
  - 事务应尽可能短
  - 只将必要的操作包含在事务中
  - 正确处理事务回滚

  ### 6.2 事务隔离级别

  **审查要点：**
  - 检查是否根据业务需求选择合适的隔离级别
  - 验证是否了解不同隔离级别的影响

  **优化建议：**
  - 大多数场景使用READ COMMITTED
  - 数据一致性要求高的场景使用REPEATABLE READ或SERIALIZABLE
  - 性能要求高的场景使用READ UNCOMMITTED（注意脏读风险）

  ### 6.3 死锁预防

  **审查要点：**
  - 检查是否存在循环依赖
  - 验证事务操作顺序是否一致
  - 检查是否使用了超时机制

  **优化建议：**
  - 所有事务按相同顺序操作资源
  - 避免在事务中等待用户输入
  - 设置合理的事务超时
  - 使用乐观锁替代悲观锁

  **示例：**
  ```sql
  -- MySQL事务示例
  START TRANSACTION;
  TRY {
      UPDATE accounts SET balance = balance - 100 WHERE id = 1;
      UPDATE accounts SET balance = balance + 100 WHERE id = 2;
      COMMIT;
  } CATCH {
      ROLLBACK;
      THROW;
  }

  -- PostgreSQL事务示例
  BEGIN;
  UPDATE accounts SET balance = balance - 100 WHERE id = 1;
  UPDATE accounts SET balance = balance + 100 WHERE id = 2;
  COMMIT;

  -- Oracle事务示例
  BEGIN
      UPDATE accounts SET balance = balance - 100 WHERE id = 1;
      UPDATE accounts SET balance = balance + 100 WHERE id = 2;
      COMMIT;
  EXCEPTION
      WHEN OTHERS THEN
          ROLLBACK;
          RAISE;
  END;
  ```

  ## 7. 数据库性能调优

  ### 7.1 配置优化

  **审查要点：**
  - 检查数据库内存配置
  - 验证缓冲区大小设置
  - 检查并发连接数设置
  - 验证日志配置

  **优化建议：**
  - 根据服务器内存大小合理设置innodb_buffer_pool_size（MySQL）
  - 调整shared_buffers（PostgreSQL）
  - 设置合理的max_connections
  - 优化日志级别和刷盘策略

  ### 7.2 连接池设置

  **审查要点：**
  - 检查连接池大小是否合理
  - 验证连接超时设置
  - 检查是否使用了连接池

  **优化建议：**
  - 根据并发量设置连接池大小
  - 设置合理的连接超时和空闲超时
  - 使用数据库连接池管理连接

  ### 7.3 缓存使用

  **审查要点：**
  - 检查是否使用查询缓存
  - 验证应用层缓存策略
  - 检查是否使用了Redis等缓存系统

  **优化建议：**
  - 合理使用查询缓存（注意缓存失效问题）
  - 对热点数据使用应用层缓存
  - 考虑使用Redis等内存数据库缓存频繁访问的数据

  **示例：**
  ```sql
  -- MySQL配置优化示例
  SET GLOBAL innodb_buffer_pool_size = 4G;
  SET GLOBAL max_connections = 200;
  SET GLOBAL query_cache_size = 64M;

  -- PostgreSQL配置优化示例
  -- 在postgresql.conf中设置
  shared_buffers = 1GB
  work_mem = 32MB
  maintenance_work_mem = 256MB
  max_connections = 200

  -- Oracle配置优化示例
  -- 通过ALTER SYSTEM命令设置
  ALTER SYSTEM SET sga_target = '4G' SCOPE=SPFILE;
  ALTER SYSTEM SET pga_aggregate_target = '2G' SCOPE=SPFILE;
  ```

  ## 8. 数据库安全

  ### 8.1 权限管理

  **审查要点：**
  - 检查是否遵循最小权限原则
  - 验证用户权限设置
  - 检查是否定期审计权限

  **优化建议：**
  - 为不同角色设置不同权限
  - 避免使用超级用户进行日常操作
  - 定期审查和回收不必要的权限

  ### 8.2 数据加密

  **审查要点：**
  - 检查敏感数据是否加密存储
  - 验证传输加密是否启用
  - 检查密码存储方式

  **优化建议：**
  - 对敏感数据使用加密存储
  - 启用SSL/TLS加密传输
  - 使用加盐哈希存储密码

  ### 8.3 SQL注入防护

  **审查要点：**
  - 检查是否使用参数化查询
  - 验证输入验证是否严格
  - 检查是否使用了ORM框架

  **优化建议：**
  - 始终使用参数化查询
  - 对用户输入进行严格验证
  - 使用ORM框架时注意防范SQL注入
  - 避免拼接SQL语句

  **示例：**
  ```sql
  -- 不安全的SQL（容易SQL注入）
  SELECT * FROM users WHERE username = '$username' AND password = '$password';

  -- 安全的参数化查询
  -- MySQL
  PREPARE stmt FROM 'SELECT * FROM users WHERE username = ? AND password = ?';
  EXECUTE stmt USING @username, @password;

  -- PostgreSQL
  PREPARE stmt AS SELECT * FROM users WHERE username = $1 AND password = $2;
  EXECUTE stmt('admin', 'pass123');

  -- Oracle
  DECLARE
      v_username VARCHAR2(50) := 'admin';
      v_password VARCHAR2(50) := 'pass123';
  BEGIN
      EXECUTE IMMEDIATE 'SELECT * FROM users WHERE username = :1 AND password = :2'
      USING v_username, v_password;
  END;
  ```

  ## 9. 最佳实践

  ### 9.1 数据库设计最佳实践

  - 遵循数据库范式设计原则
  - 合理拆分表，避免大表
  - 选择合适的数据类型
  - 为所有表设置主键
  - 使用外键保证数据一致性

  ### 9.2 索引使用最佳实践

  - 只为常用查询字段创建索引
  - 复合索引遵循最左前缀原则
  - 避免在频繁更新的列上创建过多索引
  - 定期维护和优化索引
  - 监控索引使用情况

  ### 9.3 SQL编写最佳实践

  - 只选择需要的列
  - 使用参数化查询
  - 避免使用SELECT *
  - 合理使用JOIN，避免笛卡尔积
  - 优化子查询，考虑使用连接替代

  ### 9.4 性能调优最佳实践

  - 定期分析表和更新统计信息
  - 监控慢查询日志
  - 合理配置数据库参数
  - 使用连接池管理连接
  - 对热点数据使用缓存

  ## 10. 常见问题与解决方案

  ### 10.1 性能瓶颈问题

  **症状：**
  - 查询执行缓慢
  - 数据库CPU使用率高
  - 连接数持续增长

  **解决方案：**
  - 分析慢查询日志，优化慢SQL
  - 为关键查询添加索引
  - 调整数据库配置参数
  - 考虑数据库分片或读写分离

  ### 10.2 死锁问题

  **症状：**
  - 事务执行卡住
  - 出现死锁错误

  **解决方案：**
  - 按相同顺序操作资源
  - 减少事务范围和持续时间
  - 使用乐观锁替代悲观锁
  - 设置合理的事务超时

  ### 10.3 数据一致性问题

  **症状：**
  - 数据不匹配
  - 外键约束失败

  **解决方案：**
  - 使用事务保证操作原子性
  - 正确设置外键约束
  - 避免在应用层实现约束逻辑
  - 定期验证数据一致性

  ### 10.4 扩展性问题

  **症状：**
  - 数据量增长导致性能下降
  - 单库单表限制

  **解决方案：**
  - 数据库分片
  - 读写分离
  - 垂直分表和水平分表
  - 考虑使用分布式数据库

