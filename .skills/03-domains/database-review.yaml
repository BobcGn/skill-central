  - [ ] 连接池设置是否合理
  - [ ] 缓存策略是否有效
  - [ ] 权限设置是否遵循最小权限原则
  - [ ] 敏感数据是否加密
  - [ ] 是否防范SQL注入

  ## 12. 工具推荐

