  dependencies {
      implementation("org.jetbrains.koog:koog-core:0.1.0")
      implementation("org.jetbrains.koog:koog-llm-openai:0.1.0") // OpenAI integration
      implementation("org.jetbrains.koog:koog-tools:0.1.0") // Tool support
      implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3")
      implementation("org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.0")
  }
  ```

  #### 2.2 Creating a Basic Agent

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking

  fun main() = runBlocking {
      // Initialize the OpenAI client
      val openAIClient = OpenAIClient("your-api-key")

      // Create the agent
      val agent = koogAgent {
          llm = openAIClient
          prompt = "You are a helpful AI assistant. Please answer user questions concisely and clearly."
      }

      // Interact with the agent
      val response = agent.generate("What is Kotlin?")
      println(response)
  }
  ```

  #### 2.3 Creating a Functional Agent

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")

      // Create a functional agent
      val agent = functionalAgent {
          llm = openAIClient
          // Custom logic
          generate = { context ->
              val prompt = "You are a professional programming instructor. " +
                          "Please explain the following concept: ${context.lastMessage().content}"
              openAIClient.generate(prompt)
          }
      }

      val response = agent.generate("What are coroutines?")
      println(response)
  }
  ```

  #### 2.4 Creating an Agent with Tools

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking

  // Define the tool
  class CalculatorTool : Tool {
      override val name = "calculator"
      override val description = "Performs mathematical calculations"

      override suspend fun execute(arguments: Map<String, Any>): ToolResult {
          val expression = arguments["expression"] as String
          return try {
              val result = evalExpression(expression)
              ToolResult.Success(mapOf("result" to result))
          } catch (e: Exception) {
              ToolResult.Error(e.message ?: "Calculation error")
          }
      }

      private fun evalExpression(expression: String): Double {
          // Simple expression evaluation implementation
          return expression.toDouble() // In production, use a more robust parser
      }
  }

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")

      // Create an agent with tools
      val agent = koogAgent {
          llm = openAIClient
          prompt = "You are a helpful AI assistant. When calculation is needed, please use the calculator tool."
          tools = listOf(CalculatorTool())
      }

      val response = agent.generate("What is 3.14 * 10?")
      println(response)
  }
  ```

  ### 3. Integrating with Server-Side Frameworks

  #### 3.1 Integrating with Ktor

  ##### 3.1.1 Project Setup

  ```kotlin
  // build.gradle.kts
  plugins {
      kotlin("jvm") version "1.9.20"
      id("io.ktor.plugin") version "2.3.7"
      kotlin("plugin.serialization") version "1.9.20"
  }

  repositories {
      mavenCentral()
  }

  dependencies {
      implementation("io.ktor:ktor-server-core-jvm")
      implementation("io.ktor:ktor-server-netty-jvm")
      implementation("io.ktor:ktor-server-content-negotiation-jvm")
      implementation("io.ktor:ktor-serialization-kotlinx-json-jvm")
      implementation("org.jetbrains.koog:koog-core:0.1.0")
      implementation("org.jetbrains.koog:koog-llm-openai:0.1.0")
      implementation("org.jetbrains.koog:koog-tools:0.1.0")
      implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3")
  }
  ```

  ##### 3.1.2 Creating the Ktor Application

  ```kotlin
  import io.ktor.server.application.*
  import io.ktor.server.engine.*
  import io.ktor.server.netty.*
  import io.ktor.server.routing.*
  import io.ktor.server.request.*
  import io.ktor.server.response.*
  import io.ktor.serialization.kotlinx.json.*
  import io.ktor.server.plugins.contentnegotiation.*
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.serialization.Serializable

  // Define request and response models
  @Serializable
  data class ChatRequest(val message: String)

  @Serializable
  data class ChatResponse(val response: String)

  fun main() {
      embeddedServer(Netty, port = 8080, host = "0.0.0.0") {
          install(ContentNegotiation) {
              json()
          }

          // Initialize the Koog Agent
          val openAIClient = OpenAIClient(System.getenv("OPENAI_API_KEY"))
          val agent = koogAgent {
              llm = openAIClient
              prompt = "You are a helpful AI assistant. Please answer user questions concisely and clearly."
          }

          routing {
              post("/chat") {
                  val request = call.receive<ChatRequest>()
                  val response = agent.generate(request.message)
                  call.respond(ChatResponse(response))
              }
          }
      }.start(wait = true)
  }
  ```

  ##### 3.1.3 Calling the LLM Directly via Routes

  Below is a more complete implementation showing how to call an LLM directly from a Ktor route using the Koog framework:

  ```kotlin
  // Routing.kt
  import ai.koog.ktor.Koog
  import ai.koog.ktor.aiAgent
  import ai.koog.prompt.executor.clients.deepseek.DeepSeekModels
  import io.ktor.http.*
  import io.ktor.server.application.*
  import io.ktor.server.request.*
  import io.ktor.server.response.*
  import io.ktor.server.routing.*
  import java.io.File

  fun Application.configureRouting() {
      // Install the Koog framework and configure the DeepSeek LLM
      install(Koog) {
          llm {
              deepSeek(apiKey = System.getenv("DEEPSEEK_API_KEY") ?: error("DeepSeek API Key not found in the environment!"))
          }
      }

      routing {
          get("/") {
              call.respondText("Hello World!")
          }

          // Serve the chat UI
          get("/chat.html") {
              val file = File("src/main/resources/chat.html")
              if (file.exists()) {
                  call.respondText(file.readText(), ContentType.Text.Html)
              } else {
                  call.respond(HttpStatusCode.NotFound, "File not found")
              }
          }

          // Koog AI chat endpoint
          post("/chat") {
              val userInput = call.receiveText()
              val output = aiAgent(userInput, model = DeepSeekModels.DeepSeekChat)
              call.respond(HttpStatusCode.OK, output)
          }
      }
  }
  ```

