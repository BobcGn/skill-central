  ##### 3.2.2 Creating the Spring Boot Application

  ```kotlin
  import org.springframework.boot.autoconfigure.SpringBootApplication
  import org.springframework.boot.runApplication
  import org.springframework.web.bind.annotation.PostMapping
  import org.springframework.web.bind.annotation.RequestBody
  import org.springframework.web.bind.annotation.RestController
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient

  @SpringBootApplication
  class KoogSpringApplication

  fun main(args: Array<String>) {
      runApplication<KoogSpringApplication>(*args)
  }

  // Define request and response models
  data class ChatRequest(val message: String)
  data class ChatResponse(val response: String)

  @RestController
  class ChatController {
      private val agent: KoogAgent

      init {
          val openAIClient = OpenAIClient(System.getenv("OPENAI_API_KEY"))
          agent = koogAgent {
              llm = openAIClient
              prompt = "You are a helpful AI assistant. Please answer user questions concisely and clearly."
          }
      }

      @PostMapping("/chat")
      suspend fun chat(@RequestBody request: ChatRequest): ChatResponse {
          val response = agent.generate(request.message)
          return ChatResponse(response)
      }
  }
  ```

  ### 4. Frontend Implementation

  #### 4.1 HTML + JavaScript Implementation

  Below is a simple HTML + JavaScript chat UI implementation:

  ```html
  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AI Chat</title>
      <style>
          /* Styles omitted */
      </style>
  </head>
  <body>
      <h1>AI Chat</h1>
      <div class="chat-container" id="chatContainer">
          <div class="message ai-message">
              Hello! I'm an AI assistant. How can I help you?
          </div>
      </div>
      <div class="input-container">
          <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
          <button id="sendButton">Send</button>
      </div>
      <div class="error-message" id="errorMessage"></div>

      <script>
          const chatContainer = document.getElementById('chatContainer');
          const messageInput = document.getElementById('messageInput');
          const sendButton = document.getElementById('sendButton');
          const errorMessage = document.getElementById('errorMessage');

          // Send message function
          async function sendMessage() {
              const message = messageInput.value.trim();
              if (!message) return;

              // Clear error info
              errorMessage.textContent = '';

              // Add user message to the UI
              addMessage(message, 'user');
              messageInput.value = '';

              // Show loading state
              const loadingElement = addLoading();

              try {
                  // Send POST request to the backend API
                  const response = await fetch('http://localhost:8088/chat', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'text/plain'
                      },
                      body: message
                  });

                  if (!response.ok) {
                      throw new Error(`Network response error: ${response.status} ${response.statusText}`);
                  }

                  const aiResponse = await response.text();
                  // Remove loading state
                  if (loadingElement) loadingElement.remove();
                  // Add AI response to the UI
                  addMessage(aiResponse, 'ai');
              } catch (error) {
                  // Remove loading state
                  if (loadingElement) loadingElement.remove();
                  // Show error message
                  addMessage('Sorry, an error occurred: ' + error.message, 'ai');
                  // Log detailed error to console
                  console.error('Detailed error info:', error);
                  // Show detailed error on the page
                  errorMessage.textContent = `Detailed error: ${error.message}`;
              }
          }

          // Append a message to the chat UI
          function addMessage(text, sender) {
              const messageDiv = document.createElement('div');
              messageDiv.className = `message ${sender}-message`;
              messageDiv.textContent = text;
              chatContainer.appendChild(messageDiv);
              // Scroll to bottom
              chatContainer.scrollTop = chatContainer.scrollHeight;
          }

          // Append a loading indicator
          function addLoading() {
              const loadingDiv = document.createElement('div');
              loadingDiv.className = 'message ai-message';
              loadingDiv.innerHTML = '<div class="loading"></div>';
              chatContainer.appendChild(loadingDiv);
              // Scroll to bottom
              chatContainer.scrollTop = chatContainer.scrollHeight;
              return loadingDiv;
          }

          // Send button click handler
          sendButton.addEventListener('click', sendMessage);

          // Input field Enter key handler
          messageInput.addEventListener('keypress', function (e) {
              if (e.key === 'Enter') {
                  sendMessage();
              }
          });
      </script>
  </body>
  </html>
  ```

  #### 4.2 Vue Implementation

  Below is a chat component implemented in Vue 3:

  ```vue
  <!-- Chat.vue -->
  <template>
    <div class="chat-container">
      <h1>AI Chat</h1>
      <div class="messages" ref="messagesContainer">
        <div class="message ai-message" v-for="(msg, index) in messages" :key="index">
          {{ msg.content }}
        </div>
      </div>
      <div class="input-area">
        <input
          type="text"
          v-model="inputMessage"
          placeholder="Type a message..."
          @keyup.enter="sendMessage"
        />
        <button @click="sendMessage" :disabled="isLoading">
          {{ isLoading ? 'Sending...' : 'Send' }}
        </button>
      </div>
      <div class="error" v-if="errorMessage">{{ errorMessage }}</div>
    </div>
  </template>

  <script setup>
  import { ref, onMounted, nextTick } from 'vue';
  import axios from 'axios';

  const messages = ref([
    { content: 'Hello! I am an AI assistant. How can I help you?', sender: 'ai' }
  ]);
  const inputMessage = ref('');
  const isLoading = ref(false);
  const errorMessage = ref('');
  const messagesContainer = ref(null);

  // Send a message
  async function sendMessage() {
    const message = inputMessage.value.trim();
    if (!message || isLoading.value) return;

    // Clear error info
    errorMessage.value = '';

    // Add user message
    messages.value.push({ content: message, sender: 'user' });
    inputMessage.value = '';
    await scrollToBottom();

    // Show loading state
    isLoading.value = true;

    try {
      // Call the backend API
      const response = await axios.post('http://localhost:8088/chat', message, {
        headers: {
          'Content-Type': 'text/plain'
        }
      });

      // Add AI response
      messages.value.push({ content: response.data, sender: 'ai' });
    } catch (error) {
      // Handle error
      console.error('API call error:', error);
      errorMessage.value = `Error: ${error.message}`;
      messages.value.push({
        content: `Sorry, an error occurred: ${error.message}`,
        sender: 'ai'
      });
    } finally {
      // End loading state
      isLoading.value = false;
      await scrollToBottom();
    }
  }

  // Scroll to bottom
  async function scrollToBottom() {
    await nextTick();
    if (messagesContainer.value) {
      messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
    }
  }

  // Scroll to bottom after the component is mounted
  onMounted(() => {
    scrollToBottom();
  });
  </script>

