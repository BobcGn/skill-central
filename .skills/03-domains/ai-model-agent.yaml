  ### 5. Advanced Features & Best Practices

  #### 5.1 Complex Workflows

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")

      // Create an agent with a workflow
      val agent = koogAgent {
          llm = openAIClient
          prompt = "You are a helpful AI assistant."

          // Define the workflow
          workflow {
              node("greeting") {
                  action {
                      val message = context.lastMessage().content
                      if (message.contains("你好") || message.contains("hello")) {
                          transitionTo("welcome")
                      } else {
                          transitionTo("assist")
                      }
                  }
              }

              node("welcome") {
                  action {
                      val response = "Hello! I am your AI assistant. How can I help you?"
                      context.addMessage(Message.Role.Assistant, response)
                      transitionTo("assist")
                  }
              }

              node("assist") {
                  action {
                      val message = context.lastMessage().content
                      val response = openAIClient.generate("${prompt}\nUser asks: ${message}")
                      context.addMessage(Message.Role.Assistant, response)
                      transitionTo("end")
                  }
              }

              node("end") {
                  action {}
              }
          }
      }

      val response = agent.generate("Hello")
      println(response)
  }
  ```

  #### 5.2 Structured Output

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking
  import kotlinx.serialization.Serializable

  @Serializable
  data class TaskResult(
      val summary: String,
      val steps: List<String>,
      val success: Boolean
  )

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")

      val agent = koogAgent {
