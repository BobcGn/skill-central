  ### 4. 前端实现

  #### 4.1 HTML + JavaScript实现

  以下是一个简单的HTML + JavaScript聊天界面实现：

  ```html
  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AI聊天</title>
      <style>
          /* 样式省略 */
      </style>
  </head>
  <body>
      <h1>AI聊天</h1>
      <div class="chat-container" id="chatContainer">
          <div class="message ai-message">
              你好！我是AI助手，有什么可以帮助你的吗？
          </div>
      </div>
      <div class="input-container">
          <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
          <button id="sendButton">发送</button>
      </div>
      <div class="error-message" id="errorMessage"></div>

      <script>
          const chatContainer = document.getElementById('chatContainer');
          const messageInput = document.getElementById('messageInput');
          const sendButton = document.getElementById('sendButton');
          const errorMessage = document.getElementById('errorMessage');

          // 发送消息函数
          async function sendMessage() {
              const message = messageInput.value.trim();
              if (!message) return;

              // 清空错误信息
              errorMessage.textContent = '';

              // 添加用户消息到界面
              addMessage(message, 'user');
              messageInput.value = '';

              // 显示加载状态
              const loadingElement = addLoading();

              try {
                  // 发送POST请求到后端API
                  const response = await fetch('http://localhost:8088/chat', {
                      method: 'POST',
                      headers: {
                          'Content-Type': 'text/plain'
                      },
                      body: message
                  });

                  if (!response.ok) {
                      throw new Error(`网络响应错误: ${response.status} ${response.statusText}`);
                  }

                  const aiResponse = await response.text();
                  // 移除加载状态
                  if (loadingElement) loadingElement.remove();
                  // 添加AI响应到界面
                  addMessage(aiResponse, 'ai');
              } catch (error) {
                  // 移除加载状态
                  if (loadingElement) loadingElement.remove();
                  // 显示错误消息
                  addMessage('抱歉，发生了错误：' + error.message, 'ai');
                  // 在控制台中显示详细错误
                  console.error('详细错误信息:', error);
                  // 在页面上显示详细错误
                  errorMessage.textContent = `详细错误: ${error.message}`;
              }
          }

          // 添加消息到聊天界面
          function addMessage(text, sender) {
              const messageDiv = document.createElement('div');
              messageDiv.className = `message ${sender}-message`;
              messageDiv.textContent = text;
              chatContainer.appendChild(messageDiv);
              // 滚动到底部
              chatContainer.scrollTop = chatContainer.scrollHeight;
          }

          // 添加加载状态
          function addLoading() {
              const loadingDiv = document.createElement('div');
              loadingDiv.className = 'message ai-message';
              loadingDiv.innerHTML = '<div class="loading"></div>';
              chatContainer.appendChild(loadingDiv);
              // 滚动到底部
              chatContainer.scrollTop = chatContainer.scrollHeight;
              return loadingDiv;
          }

          // 发送按钮点击事件
          sendButton.addEventListener('click', sendMessage);

          // 输入框回车事件
          messageInput.addEventListener('keypress', function (e) {
              if (e.key === 'Enter') {
                  sendMessage();
              }
          });
      </script>
  </body>
  </html>
  ```

  #### 4.2 Vue实现

