  ### 5. 高级功能与最佳实践

  #### 5.1 复杂工作流

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")
      
      // 创建带工作流的智能体
      val agent = koogAgent {
          llm = openAIClient
          prompt = "你是一个 helpful 的AI助手。"
          
          // 定义工作流
          workflow {
              node("greeting") {
                  action {
                      val message = context.lastMessage().content
                      if (message.contains("你好") || message.contains("hello")) {
                          transitionTo("welcome")
                      } else {
                          transitionTo("assist")
                      }
                  }
              }
              
              node("welcome") {
                  action {
                      val response = "你好！我是你的AI助手，有什么可以帮助你的吗？"
                      context.addMessage(Message.Role.Assistant, response)
                      transitionTo("assist")
                  }
              }
              
              node("assist") {
                  action {
                      val message = context.lastMessage().content
                      val response = openAIClient.generate("${prompt}\n用户问：${message}")
                      context.addMessage(Message.Role.Assistant, response)
                      transitionTo("end")
                  }
              }
              
              node("end") {
                  action {}
              }
          }
      }
      
      val response = agent.generate("你好")
      println(response)
  }
  ```

  #### 5.2 结构化输出

  ```kotlin
  import org.jetbrains.koog.*
  import org.jetbrains.koog.llm.openai.OpenAIClient
  import kotlinx.coroutines.runBlocking
  import kotlinx.serialization.Serializable

  @Serializable
  data class TaskResult(
      val summary: String,
      val steps: List<String>,
      val success: Boolean
  )

  fun main() = runBlocking {
      val openAIClient = OpenAIClient("your-api-key")
      
      val agent = koogAgent {
          llm = openAIClient
          prompt = "你是一个任务分析助手。请分析以下任务并以结构化格式返回结果。"
      }
      
      val response = agent.generateStructured<TaskResult>(
          "请分析如何实现一个简单的待办事项应用",
          TaskResult.serializer()
      )
      
      println("摘要: ${response.summary}")
      println("步骤:")
      response.steps.forEachIndexed { index, step ->
          println("${index + 1}. $step")
      }
      println("成功: ${response.success}")
  }
  ```

