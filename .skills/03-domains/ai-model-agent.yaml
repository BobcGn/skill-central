  #### 5.4 Best Practices

  - **Prompt engineering**: design prompts carefully, with clear task goals and output formats
  - **Tool design**: provide agents with relevant tools to enhance their capabilities
  - **Error handling**: implement proper error handling and retry mechanisms
  - **Context management**: manage conversation history sensibly to avoid overly long context
  - **Performance optimization**: use streaming responses, parallel tool calls, and other techniques to improve performance
  - **Security**: restrict tool permissions to prevent malicious use
  - **Testability**: design agents to be testable, enabling unit testing

  ### 6. Deployment & Monitoring

  #### 6.1 Deployment Strategies

  ##### 6.1.1 Containerized Deployment

  ```dockerfile
  FROM openjdk:17-jdk-slim

  WORKDIR /app

  COPY build/libs/koog-app.jar app.jar

  ENV OPENAI_API_KEY=your-api-key

  EXPOSE 8080

  CMD ["java", "-jar", "app.jar"]
  ```

  ##### 6.1.2 Kubernetes Deployment

  ```yaml
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: koog-agent
    labels:
      app: koog-agent
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: koog-agent
    template:
      metadata:
        labels:
          app: koog-agent
      spec:
        containers:
        - name: koog-agent
          image: your-registry/koog-agent:latest
          ports:
