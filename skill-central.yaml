# ============================================================================
# skill-central.yaml — 项目本地层级配置
# ----------------------------------------------------------------------------
# 定义各技能目录的加载顺序与优先级。数值越大，优先级越高。
# 当多个层定义了相同 id 的技能时，高优先级层的版本胜出。
# ============================================================================
layers:
  - name: "global"
    path: ".skills/global"
    priority: 10
  - name: "languages"
    path: ".skills/languages"
    priority: 20
  - name: "frameworks"
    path: ".skills/frameworks"
    priority: 30
